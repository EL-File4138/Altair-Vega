<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Altair Vega Web</title>
    <script type="module" src="/src/main.ts"></script>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: #0a0b10;
        color: #f0f3ff;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(110, 152, 255, 0.18), transparent 35%),
          radial-gradient(circle at bottom right, rgba(92, 255, 193, 0.14), transparent 30%),
          #0a0b10;
      }
      #app {
        max-width: 1040px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }
      .shell {
        display: grid;
        gap: 16px;
      }
      .card {
        background: rgba(10, 15, 28, 0.74);
        border: 1px solid rgba(156, 174, 255, 0.2);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(16px);
      }
      h1, h2 {
        margin: 0 0 12px;
        font-weight: 650;
        letter-spacing: 0.01em;
      }
      p, label, li {
        color: #d4daf4;
      }
      .muted {
        color: #97a3d6;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }
      input, textarea, button, select {
        font: inherit;
      }
      input, textarea {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(156, 174, 255, 0.28);
        background: rgba(7, 11, 22, 0.88);
        color: #f0f3ff;
        padding: 12px 14px;
        box-sizing: border-box;
      }
      textarea {
        min-height: 110px;
        resize: vertical;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        background: linear-gradient(120deg, #6e98ff, #54e2c8);
        color: #07101f;
        cursor: pointer;
        font-weight: 700;
      }
      button.secondary {
        background: rgba(156, 174, 255, 0.14);
        color: #dfe5ff;
        border: 1px solid rgba(156, 174, 255, 0.2);
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }
      .peer-list, .event-list {
        display: grid;
        gap: 10px;
        padding: 0;
        margin: 0;
        list-style: none;
      }
      .peer-item, .event-item {
        border: 1px solid rgba(156, 174, 255, 0.16);
        border-radius: 14px;
        padding: 12px 14px;
        background: rgba(7, 11, 22, 0.66);
      }
      code {
        word-break: break-all;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(84, 226, 200, 0.12);
        color: #97f4df;
      }
      .status.offline {
        background: rgba(255, 144, 120, 0.12);
        color: #ffc8bb;
      }
      @media (max-width: 640px) {
        #app {
          padding: 20px 14px 40px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
  </body>
  </html>
