name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test
      - run: cargo build --release

  web:
    name: Web
    runs-on: ubuntu-latest
    env:
      VITE_DEFAULT_RENDEZVOUS_URL: wss://tools.elfile4138.moe/altair-vega/__altair_vega_rendezvous
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json
      - uses: Swatinem/rust-cache@v2
      - run: cargo install wasm-pack --locked
      - run: npm run build:wasm:release
        working-directory: web/frontend
      - run: npm ci
        working-directory: web/frontend
      - run: npm run build
        working-directory: web/frontend

      - name: Deploy Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: npx wrangler pages deploy web/frontend/dist --project-name=altair-vega --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  worker:
    name: Rendezvous Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/rendezvous-worker/package-lock.json
      - run: npm ci
        working-directory: web/rendezvous-worker
      - run: npm run check
        working-directory: web/rendezvous-worker
      - run: npm run deploy:dry-run
        working-directory: web/rendezvous-worker
